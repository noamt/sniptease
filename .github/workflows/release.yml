name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, and release .dmg
    runs-on: macos-15
    env:
      TEAM_ID: 3VH2QA272T
      KEYCHAIN: build.keychain-db
      KEYCHAIN_PASSWORD: ci-ephemeral
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      # ── Import Developer ID certificate ──────────────────────────
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN"

          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "✅ Certificate imported"

      # ── Build and sign ───────────────────────────────────────────
      - name: Build Release (signed)
        run: |
          xcodebuild \
            -project SnipTease.xcodeproj \
            -scheme SnipTease \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            build

      - name: Locate .app
        id: locate
        run: |
          APP_PATH="build/Build/Products/Release/SnipTease.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "SnipTease.app not found at $APP_PATH"
            find build -name "SnipTease.app" -type d
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Re-sign embedded frameworks
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          SIGN_ID="Developer ID Application"
          FLAGS="--force --timestamp --options runtime --sign"

          # Sign Sparkle's nested binaries from inside out
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"
          if [ -d "$FRAMEWORKS/Sparkle.framework" ]; then
            echo "Re-signing Sparkle framework binaries..."

            # XPC Services
            find "$FRAMEWORKS/Sparkle.framework" -path "*/XPCServices/*/MacOS/*" -type f | while read bin; do
              echo "  Signing: $bin"
              codesign $FLAGS "$SIGN_ID" "$bin"
            done

            # Sign each XPC bundle
            find "$FRAMEWORKS/Sparkle.framework" -name "*.xpc" -type d | while read xpc; do
              echo "  Signing: $xpc"
              codesign $FLAGS "$SIGN_ID" "$xpc"
            done

            # Updater.app and Autoupdate
            find "$FRAMEWORKS/Sparkle.framework" -name "Autoupdate" -type f | while read bin; do
              echo "  Signing: $bin"
              codesign $FLAGS "$SIGN_ID" "$bin"
            done
            find "$FRAMEWORKS/Sparkle.framework" -path "*/Updater.app/Contents/MacOS/Updater" -type f | while read bin; do
              echo "  Signing: $bin"
              codesign $FLAGS "$SIGN_ID" "$bin"
            done
            find "$FRAMEWORKS/Sparkle.framework" -name "Updater.app" -type d | while read app; do
              echo "  Signing: $app"
              codesign $FLAGS "$SIGN_ID" "$app"
            done

            # Sign the framework itself
            codesign $FLAGS "$SIGN_ID" "$FRAMEWORKS/Sparkle.framework"
            echo "✅ Sparkle framework re-signed"
          fi

          # Re-sign the main app (picks up re-signed frameworks)
          codesign $FLAGS "$SIGN_ID" "$APP_PATH"
          codesign -dvv "$APP_PATH"
          codesign --verify --strict --deep "$APP_PATH"
          echo "✅ App signed and verified"

      # ── Notarize the .app, then staple it ────────────────────────
      - name: Set up App Store Connect API key
        env:
          API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_P8_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Notarize .app
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"

          # Zip the .app for notarytool (it requires zip or dmg)
          ditto -c -k --keepParent "$APP_PATH" SnipTease.zip
          echo "Submitting SnipTease.zip ($(du -h SnipTease.zip | cut -f1)) for notarization..."

          # Submit and capture the submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit SnipTease.zip \
            --key ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait \
            --timeout 15m 2>&1) || true
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          rm SnipTease.zip

          # Check the result — notarytool exits 0 even on Invalid status
          STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
            --key ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --output-format json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','Unknown'))" 2>/dev/null || echo "Unknown")

          echo "Notarization status: $STATUS"

          if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
            echo "❌ Notarization was rejected. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --key ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
              --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER_ID" \
              notarization_log.json 2>/dev/null || true
            cat notarization_log.json 2>/dev/null || true
            exit 1
          fi

          echo "✅ Notarization accepted"

      - name: Staple .app
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"

          # Staple the .app (not a DMG — .app stapling is reliable)
          for attempt in 1 2 3 4 5; do
            echo "Staple attempt $attempt..."
            if xcrun stapler staple "$APP_PATH"; then
              echo "✅ Stapled on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "❌ Stapling failed after 5 attempts"
              exit 1
            fi
            echo "Waiting 15s for ticket propagation..."
            sleep 15
          done

          xcrun stapler validate "$APP_PATH"
          echo "✅ Ticket validated"

      # ── Package .dmg ─────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package .dmg
        id: dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="SnipTease-${VERSION}.dmg"
          STAGING="$(mktemp -d)/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "${{ steps.locate.outputs.app_path }}" "$STAGING/"

          create-dmg \
            --volname "SnipTease ${VERSION}" \
            --window-size 540 380 \
            --icon-size 100 \
            --icon "SnipTease.app" 140 190 \
            --app-drop-link 400 190 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$STAGING" \
            || true

          if [ ! -f "$DMG_NAME" ]; then
            echo "DMG not produced"
            exit 1
          fi

          echo "dmg_path=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "Produced: $DMG_NAME ($(du -h "$DMG_NAME" | cut -f1))"

      # ── Sign DMG for Sparkle auto-updates ────────────────────────
      - name: Sign DMG with Sparkle EdDSA key
        id: sparkle_sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"

          # Find sign_update from resolved SPM packages
          SIGN_TOOL=$(find ~/Library/Developer/Xcode/DerivedData -path "*/sparkle/Sparkle/bin/sign_update" | head -1)
          if [ -z "$SIGN_TOOL" ]; then
            echo "sign_update not found, resolving packages..."
            xcodebuild -resolvePackageDependencies -project SnipTease.xcodeproj -scheme SnipTease 2>/dev/null
            SIGN_TOOL=$(find ~/Library/Developer/Xcode/DerivedData -path "*/sparkle/Sparkle/bin/sign_update" | head -1)
          fi

          if [ -z "$SIGN_TOOL" ]; then
            echo "❌ Sparkle sign_update tool not found"
            exit 1
          fi

          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_TOOL" "$DMG_PATH" --ed-key-file - 2>&1)
          echo "Sparkle signature: $SIGNATURE"

          # Parse out edSignature and length
          ED_SIGNATURE=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          LENGTH=$(echo "$SIGNATURE" | grep -o 'length="[^"]*"' | cut -d'"' -f2)

          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"
          echo "✅ DMG signed for Sparkle"

      - name: Update appcast.xml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "$APP_PATH/Contents/Info.plist")
          DMG_NAME="${{ steps.dmg.outputs.dmg_path }}"
          DMG_URL="https://github.com/noamt/sniptease/releases/download/${GITHUB_REF_NAME}/${DMG_NAME}"
          ED_SIGNATURE="${{ steps.sparkle_sign.outputs.ed_signature }}"
          LENGTH="${{ steps.sparkle_sign.outputs.length }}"
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S %z")

          ITEM="    <item>\n      <title>Version ${VERSION}</title>\n      <pubDate>${PUB_DATE}</pubDate>\n      <sparkle:version>${BUILD_NUMBER}</sparkle:version>\n      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>\n      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>\n      <enclosure url=\"${DMG_URL}\" type=\"application/octet-stream\" sparkle:edSignature=\"${ED_SIGNATURE}\" length=\"${LENGTH}\" />\n    </item>"

          awk -v item="$ITEM" '{gsub(/<\/channel>/, item "\n  </channel>"); print}' docs/appcast.xml > docs/appcast_new.xml
          mv docs/appcast_new.xml docs/appcast.xml

          echo "✅ Appcast updated with ${VERSION}"
          cat docs/appcast.xml

      - name: Push appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "Update appcast.xml for ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      # ── Cleanup keychain ─────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN" 2>/dev/null || true

      # ── Publish release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.dmg_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## SnipTease ${{ github.ref_name }}

            Native macOS menu bar utility for framing screenshots for social media.

            ### Install

            1. Download the `.dmg` below.
            2. Open it and drag `SnipTease.app` to `/Applications`.
            3. Launch SnipTease. Grant Screen Recording and Accessibility permissions when asked.

            This build is **signed and notarized** by Apple — it will open without Gatekeeper warnings.

            This release supports **automatic updates** via Sparkle.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, and release .dmg
    runs-on: macos-15
    env:
      TEAM_ID: 3VH2QA272T
      KEYCHAIN: build.keychain-db
      KEYCHAIN_PASSWORD: ci-ephemeral
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      # ── Import Developer ID certificate ──────────────────────────
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN"

          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "✅ Certificate imported"

      # ── Set up App Store Connect API key ─────────────────────────
      - name: Set up App Store Connect API key
        env:
          API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_P8_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${API_KEY_ID}.p8
          echo "✅ API key ready"

      # ── Archive ──────────────────────────────────────────────────
      - name: Archive
        run: |
          xcodebuild archive \
            -project SnipTease.xcodeproj \
            -scheme SnipTease \
            -configuration Release \
            -archivePath build/SnipTease.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"
          echo "✅ Archive created"

      # ── Export (notarize + staple via Xcode) ─────────────────────
      - name: Write export options plist
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          cat > build/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

      - name: Export, notarize, and staple
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath build/SnipTease.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"
          echo "✅ Exported, notarized, and stapled"

      - name: Verify export
        run: |
          APP_PATH="build/export/SnipTease.app"
          codesign -dvv "$APP_PATH"
          codesign --verify --strict "$APP_PATH"
          # Check staple
          xcrun stapler validate "$APP_PATH" || echo "⚠️ Staple not attached to .app (Gatekeeper still works online)"
          echo "app_path=$APP_PATH" >> "$GITHUB_ENV"

      # ── Package .dmg ─────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package .dmg
        id: dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="SnipTease-${VERSION}.dmg"
          STAGING="$(mktemp -d)/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "${{ env.app_path }}" "$STAGING/"

          create-dmg \
            --volname "SnipTease ${VERSION}" \
            --window-size 540 380 \
            --icon-size 100 \
            --icon "SnipTease.app" 140 190 \
            --app-drop-link 400 190 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$STAGING" \
            || true

          if [ ! -f "$DMG_NAME" ]; then
            echo "DMG not produced"
            exit 1
          fi

          echo "dmg_path=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "Produced: $DMG_NAME ($(du -h "$DMG_NAME" | cut -f1))"

      # ── Cleanup keychain ─────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN" 2>/dev/null || true

      # ── Publish release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.dmg_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## SnipTease ${{ github.ref_name }}

            Native macOS menu bar utility for framing screenshots for social media.

            ### Install

            1. Download the `.dmg` below.
            2. Open it and drag `SnipTease.app` to `/Applications`.
            3. Launch SnipTease. Grant Screen Recording and Accessibility permissions when asked.

            This build is **signed and notarized** by Apple — it will open without Gatekeeper warnings.

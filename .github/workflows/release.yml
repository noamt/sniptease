name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, and release .dmg
    runs-on: macos-15
    env:
      TEAM_ID: 3VH2QA272T
      KEYCHAIN: build.keychain-db
      KEYCHAIN_PASSWORD: ci-ephemeral
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      # ── Import Developer ID certificate ──────────────────────────
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode .p12
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Import certificate
          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN"

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN"

          # Add to search list so xcodebuild can find it
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

          echo "✅ Certificate imported into $KEYCHAIN"

      # ── Build with code signing ──────────────────────────────────
      - name: Build Release (signed)
        run: |
          xcodebuild \
            -project SnipTease.xcodeproj \
            -scheme SnipTease \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            build

      - name: Locate built .app
        id: locate
        run: |
          APP_PATH="build/Build/Products/Release/SnipTease.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "SnipTease.app not found at $APP_PATH"
            find build -name "SnipTease.app" -type d
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

          # Verify signature
          codesign -dvv "$APP_PATH"
          codesign --verify --strict "$APP_PATH"
          echo "✅ Code signature verified"

      # ── Package .dmg ─────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package .dmg
        id: dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="SnipTease-${VERSION}.dmg"
          STAGING="$(mktemp -d)/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "${{ steps.locate.outputs.app_path }}" "$STAGING/"

          create-dmg \
            --volname "SnipTease ${VERSION}" \
            --window-size 540 380 \
            --icon-size 100 \
            --icon "SnipTease.app" 140 190 \
            --app-drop-link 400 190 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$STAGING" \
            || true

          if [ ! -f "$DMG_NAME" ]; then
            echo "DMG not produced"
            exit 1
          fi

          # Sign the DMG itself (use generic identity — keychain resolves it)
          codesign --sign "Developer ID Application" --timestamp "$DMG_NAME"

          echo "dmg_path=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "Produced: $DMG_NAME ($(du -h "$DMG_NAME" | cut -f1))"

      # ── Notarize ─────────────────────────────────────────────────
      - name: Set up App Store Connect API key
        env:
          API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          # notarytool looks for keys in this well-known directory
          mkdir -p ~/.private_keys
          echo "$API_KEY_P8_BASE64" | base64 --decode \
            > ~/.private_keys/AuthKey_${API_KEY_ID}.p8
          echo "✅ API key written to ~/.private_keys/AuthKey_${API_KEY_ID}.p8"

      - name: Submit for notarization
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          echo "Submitting ${{ steps.dmg.outputs.dmg_path }} for notarization..."
          xcrun notarytool submit "${{ steps.dmg.outputs.dmg_path }}" \
            --key ~/.private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait \
            --timeout 15m
          echo "✅ Notarization complete"

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}"
          echo "✅ Stapled"

          # Final validation
          spctl --assess --type open --context context:primary-signature \
            -v "${{ steps.dmg.outputs.dmg_path }}" 2>&1 || true
          echo "DMG is signed, notarized, and stapled."

      # ── Cleanup keychain ─────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN" 2>/dev/null || true

      # ── Publish release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.dmg_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## SnipTease ${{ github.ref_name }}

            Native macOS menu bar utility for framing screenshots for social media.

            ### Install

            1. Download the `.dmg` below.
            2. Open it and drag `SnipTease.app` to `/Applications`.
            3. Launch SnipTease. Grant Screen Recording and Accessibility permissions when asked.

            This build is **signed and notarized** by Apple — it will open without Gatekeeper warnings.
